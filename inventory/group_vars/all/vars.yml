---
# Non-sensitive configuration that's safe to store in Git

# =============================================================================
# HOMELAB ANSIBLE VARIABLES - PUBLIC CONFIGURATION
# =============================================================================
#
# This file contains NON-SENSITIVE configuration variables used across all
# playbooks. Sensitive data (passwords, tokens, keys) goes in vault.yml
#
# =============================================================================

# -----------------------------------------------------------------------------
# NETWORK CONFIGURATION
# -----------------------------------------------------------------------------

# Primary domain for services
base_domain: "radiowaves.app"
internal_domain: "localdomain"

# Network settings
homelab_network_name: "homelab"
docker_network_subnet: "172.20.0.0/16"
docker_network_subnet_v6: "fd00:1000:1000:20::/64"

# Host IP addresses (these are local IPs, safe to be public)
ubuntu_server_ip: "192.168.1.20"
opnsense_ip: "192.168.1.1"
proxmox_ip: "192.168.1.10"

# -----------------------------------------------------------------------------
# STORAGE CONFIGURATION
# -----------------------------------------------------------------------------

# Directory paths for services
data_directory: "/data"
storage_directory: "/storage"

# Storage devices
storage_device: "/dev/sdb" # 2TB drive for Ubuntu VM
proxmox_storage_device: "/dev/sda" # 2TB drive for Proxmox host

# -----------------------------------------------------------------------------
# SYSTEM CONFIGURATION
# -----------------------------------------------------------------------------

# Primary user configuration
ubuntu_primary_user: "yash"
proxmox_primary_user: "admin"
opnsense_primary_user: "root"

# System settings
system_timezone: "America/New_York"
system_locale: "en_US.UTF-8"

# -----------------------------------------------------------------------------
# DOCKER CONFIGURATION
# -----------------------------------------------------------------------------

# Docker settings
docker_compose_version: "v2.38.1"

# SSL certificate resolver name (used in Traefik)
ssl_cert_resolver: "myresolver"

# -----------------------------------------------------------------------------
# TRAEFIK PER-SERVICE DOCKER NETWORKS
# -----------------------------------------------------------------------------
#
# Core services stay on `homelab` for internal DNS. Traefik does not join homelab;
# each routed service uses a dedicated `<name>-traefik` bridge that Traefik and
# that service join (file-provider / docker labels use those networks).
#
# enabled: true  → Traefik compose joins that external network (must already
#                  exist except whoami: the traefik role creates whoami-traefik
#                  only). Each service playbook should create its *-traefik
#                  bridge with docker_network, deploy the stack, then
#                  include_role: traefik.
# enabled: false → Traefik does not join; service compose should not reference
#                  the dedicated network until you enable it here first.
#
# Optional Portainer-only apps use traefik_side_projects in vault.yml (see
# vault_template.yml commented example), not this file.
# -----------------------------------------------------------------------------

traefik_routed_services:
  whoami:
    enabled: true
    network: "whoami-traefik"
  adguard:
    enabled: true
    network: "adguard-traefik"
  ntfy:
    enabled: true
    network: "ntfy-traefik"
  uptime_kuma:
    enabled: true
    network: "uptime-kuma-traefik"
  homarr:
    enabled: true
    network: "homarr-traefik"
  wud:
    enabled: true
    network: "wud-traefik"
  prometheus_grafana:
    enabled: true
    network: "prometheus-grafana-traefik"
  it_tools:
    enabled: true
    network: "it-tools-traefik"
  convertx:
    enabled: true
    network: "convertx-traefik"
  nextcloud:
    enabled: true
    network: "nextcloud-traefik"
  authentik:
    enabled: true
    network: "authentik-traefik"

# -----------------------------------------------------------------------------
# SERVICE CONFIGURATION
# -----------------------------------------------------------------------------

# Services that will be deployed
services:
  traefik:
    port: "8080"
    domain: "traefik.{{ base_domain }}"

  adguard:
    port: "3000"
    domain: "adguard.{{ base_domain }}"
    dns_port: "53"

  ntfy:
    port: "80"
    domain: "ntfy.{{ base_domain }}"

  uptime_kuma:
    port: "3001"
    domain: "uptime.{{ base_domain }}"

  homarr:
    port: "7575"
    domain: "{{ base_domain }}" # Root domain

  wud:
    schedule: "{{ default_update_schedule }}"
    day_of_week: "{{ default_update_day_of_week }}"

# -----------------------------------------------------------------------------
# MONITORING CONFIGURATION
# -----------------------------------------------------------------------------

# Shared default schedule/day gate for first-week monthly checks.
# Keep per-service vars below for easy overrides.
default_update_schedule: "0 12 1-7 * *"
default_update_day_of_week: "0" # Sunday (0=Sunday ... 6=Saturday)

# System update check schedules (overridable per host)
update_check_schedules:
  ubuntu_vm: "{{ default_update_schedule }}"
  proxmox: "{{ default_update_schedule }}"

# System update check weekday gates (overridable per host)
update_check_day_of_week:
  ubuntu_vm: "{{ default_update_day_of_week }}"
  proxmox: "{{ default_update_day_of_week }}"

# DNS failover monitoring schedule
dns_failover_schedule: "* * * * *" # Every minute for OPNsense AdGuard Home failover

# -----------------------------------------------------------------------------
# AUTHENTICATION CONFIGURATION
# -----------------------------------------------------------------------------

# Feature flag to enable/disable authentication across all services
# Set to false during initial deployment, true after Authentik is ready
auth_enabled: true
# User Groups with Access Control
homelab_user_groups:
  admins: [ "yash" ] # Full access to everything
  operators: [ "dushyant" ] # Full AdGuard + View-only admin services + Regular user family services
  family: [ "leena", "ria" ] # NextCloud + Homarr only

# =============================================================================
# IMPORTANT NOTES
# =============================================================================
#
# 🔒 SENSITIVE DATA LOCATION:
# All sensitive data (passwords, API tokens, etc.) should be stored in:
# group_vars/all/vault.yml (encrypted with ansible-vault)
#
# 📝 TO UPDATE SENSITIVE DATA:
# 1. Copy group_vars/vault_template.yml to group_vars/all/vault.yml
# 2. Edit vault.yml with your actual sensitive values
# 3. Encrypt: ansible-vault encrypt group_vars/all/vault.yml
#
# =============================================================================
