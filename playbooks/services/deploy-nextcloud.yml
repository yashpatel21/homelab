---
# =============================================================================
# PHASE 4: Family Services - Nextcloud All-in-One Platform Deployment
# =============================================================================
#
# This playbook deploys Nextcloud All-in-One (AIO) platform for file
# synchronization, collaboration, and family productivity services.
#
# Prerequisites:
# - Phase 1, 2, and 3 completed (infrastructure, core services, supporting services)
# - DNS overrides configured in OPNsense for cloud.radiowaves.app and aio.radiowaves.app
# - Traefik operational with dynamic configuration support
# - Docker installed and homelab network created
# - Sufficient storage space for family file synchronization
#
# What this playbook does:
# 1. Creates Nextcloud configuration directories
# 2. Deploys Traefik dynamic configuration for Nextcloud routing
# 3. Deploys Nextcloud AIO master container with proper configuration
# 4. Configures persistent volumes with proper permissions
# 5. Verifies service deployment and accessibility
#
# Idempotent Design:
# - Safe to run multiple times
# - Preserves existing Nextcloud configuration and data
# - Handles configuration updates gracefully
# - Works with existing Nextcloud deployments
#
# Manual Configuration Required:
# - Initial AIO setup via web interface at https://aio.radiowaves.app
# - Domain and SSL configuration for cloud.radiowaves.app
# - Admin account creation and security configuration
# - User account management for family members
# - Mobile app configuration for file synchronization
#
# Usage:
# ansible-playbook -i inventory/homelab.yml playbooks/services/deploy-nextcloud.yml --ask-vault-pass
#
# Execution:
# This playbook runs all tasks from start to finish to ensure the complete
# deployment and configuration. All tasks are idempotent and safe to run multiple times.
# =============================================================================

- name: Deploy Nextcloud All-in-One Platform
  hosts: ubuntu_servers
  become: true
  vars:
    service_name: "nextcloud"
    compose_file: "{{ data_directory }}/compose/{{ service_name }}-compose.yml"
    traefik_config_file: "{{ data_directory }}/traefik/dynamic/{{ service_name }}.yml"
    ssl_cert_resolver: "myresolver"

  tasks:
    # =============================================================================
    # SETUP: Directory and Configuration Creation
    # =============================================================================

    - name: "Setup - Create Nextcloud directories"
      file:
        path: "{{ item }}"
        state: directory
        owner: "{{ ubuntu_primary_user }}"
        group: "{{ ubuntu_primary_user }}"
        mode: "0755"
      loop:
        - "{{ data_directory }}/{{ service_name }}"
        - "{{ data_directory }}/{{ service_name }}/data"
        - "{{ data_directory }}/{{ service_name }}/config"
        - "/storage/{{ service_name }}"
    - name: "Setup - Generate Traefik dynamic configuration for Nextcloud"
      template:
        src: "nextcloud-traefik-config.yml.j2"
        dest: "{{ traefik_config_file }}"
        owner: "{{ ubuntu_primary_user }}"
        group: "{{ ubuntu_primary_user }}"
        mode: "0644"
      register: traefik_config_updated
    - name: "Setup - Generate Docker Compose file from template"
      template:
        src: "nextcloud-compose.yml.j2"
        dest: "{{ compose_file }}"
        owner: "{{ ubuntu_primary_user }}"
        group: "{{ ubuntu_primary_user }}"
        mode: "0644"
        backup: yes
      register: compose_updated

    - name: "Setup - Ensure dedicated Traefik Docker network exists (Nextcloud)"
      docker_network:
        name: "{{ traefik_routed_services.nextcloud.network }}"
        driver: bridge
        enable_ipv6: true
      when: traefik_routed_services.nextcloud.enabled | default(false) | bool

    - name: "Setup - Set Nextcloud storage directory permissions"
      file:
        path: "/storage/{{ service_name }}"
        owner: "33" # www-data user in Nextcloud AIO Apache container
        group: "33" # www-data group in Nextcloud AIO Apache container
        mode: "0755"
        recurse: yes
    - name: "Setup - Display configuration file locations"
      debug:
        msg: |
          📋 NEXTCLOUD CONFIGURATION FILES:
          • Docker Compose file: {{ compose_file }}
          • Traefik dynamic config: {{ traefik_config_file }}
          • Data storage directory: /storage/{{ service_name }}
    # =============================================================================
    # DEPLOY: Service Deployment and Management
    # =============================================================================

    - name: "Deploy - Check for existing Nextcloud containers"
      shell: "docker ps -a | grep nextcloud || true"
      register: existing_nextcloud_containers
      changed_when: false
      failed_when: false
    - name: "Deploy - Check for port 9080 conflicts"
      shell: "docker ps | grep ':9080->' || true"
      register: port_9080_conflicts
      changed_when: false
      failed_when: false
    - name: "Deploy - Display existing containers and port conflicts"
      debug:
        msg: |
          🔍 NEXTCLOUD DEPLOYMENT CHECK:

          {% if existing_nextcloud_containers.stdout %}
          ⚠️  Existing Nextcloud containers found:
          {{ existing_nextcloud_containers.stdout }}
          {% else %}
          ✅ No existing Nextcloud containers found
          {% endif %}

          {% if port_9080_conflicts.stdout %}
          ⚠️  Port 9080 conflict detected:
          {{ port_9080_conflicts.stdout }}
          💡 These containers may need to be stopped before deployment
          {% else %}
          ✅ Port 9080 is available for Nextcloud AIO
          {% endif %}
    - name: "Deploy - Check if containers are already running"
      command: "docker compose -f {{ compose_file }} ps -q"
      register: running_containers
      changed_when: false
      failed_when: false
    - name: "Deploy - Stop existing containers (if compose file changed)"
      command: "docker compose -f {{ compose_file }} down"
      when:
        - running_containers.stdout != ""
        - "compose_updated.changed"
    - name: "Deploy - Remove conflicting containers (automatic cleanup)"
      shell: |
        # Remove containers with conflicting names (including stopped ones)
        if docker ps -a -q -f name=^nextcloud-aio-mastercontainer$ | grep -q .; then
          echo "Removing existing container: nextcloud-aio-mastercontainer"
          docker stop nextcloud-aio-mastercontainer 2>/dev/null || true
          docker rm nextcloud-aio-mastercontainer 2>/dev/null || true
        fi
      register: cleanup_result
      changed_when: "'Removing existing container' in cleanup_result.stdout"
    - name: "Deploy - Pull latest container images"
      command: "docker compose -f {{ compose_file }} pull"
      register: pull_result
      changed_when: "'Downloaded newer image' in pull_result.stdout"
    - name: "Deploy - Start Nextcloud AIO service"
      command: "docker compose -f {{ compose_file }} up -d"
      register: deploy_result
      changed_when: "'Started' in deploy_result.stderr or 'Created' in deploy_result.stderr"
    # Loopback: same-host TCP to ubuntu_server_ip:9080 can fail under some firewall/routing setups.
    - name: "Deploy - Wait for Nextcloud AIO to be ready"
      wait_for:
        port: 9080
        host: "127.0.0.1"
        delay: 5
        timeout: 300

    # Nextcloud-AIO exception: child containers (e.g. nextcloud-aio-apache) are not in this
    # compose file—only the master is. Redeploying the master does not recreate Apache, and AIO
    # only runs the extra attach for APACHE_ADDITIONAL_NETWORK on its full start path, so Apache
    # can stay off the Traefik bridge even when that network exists. docker network connect here
    # matches AIO’s own connect call and keeps per-service Traefik routing without homelab.
    - name: "Deploy - Ensure nextcloud-aio-apache joins Nextcloud Traefik isolation
        network"
      when: traefik_routed_services.nextcloud.enabled | default(false) | bool
      block:
        - name: "Deploy - Wait for nextcloud-aio-apache container (AIO creates it after
            master)"
          command: "docker inspect nextcloud-aio-apache --format '{{ '{{' }}json
            .NetworkSettings.Networks{{ '}}' }}'"
          register: apache_networks_json
          until: apache_networks_json.rc == 0 and apache_networks_json.stdout | length > 2
          retries: 36
          delay: 10
          changed_when: false
          failed_when: false

        - name: "Deploy - Connect nextcloud-aio-apache to Traefik isolation network if
            missing"
          vars:
            _nc_tf_net: "{{ traefik_routed_services.nextcloud.network }}"
            _keys: "{{ (apache_networks_json.stdout | default('{}', true)) | from_json |
              dict2items | map(attribute='key') | list }}"
          command: "docker network connect {{ _nc_tf_net }} nextcloud-aio-apache"
          when:
            - apache_networks_json.rc == 0
            - _nc_tf_net not in _keys
          register: apache_net_connect
          changed_when: not (apache_net_connect.skipped | default(false)) and
            apache_net_connect.rc == 0
          failed_when: >-
            not (apache_net_connect.skipped | default(false)) and
            (apache_net_connect.rc | default(1)) != 0

    - name: "Deploy - Redeploy Traefik to join Nextcloud Traefik network"
      ansible.builtin.include_role:
        name: traefik
      vars:
        service_name: traefik
        compose_file: "{{ data_directory }}/compose/traefik-compose.yml"
      when: traefik_routed_services.nextcloud.enabled | default(false) | bool

    # =============================================================================
    # VERIFY: Service Verification and Health Checks
    # =============================================================================

    - name: "Verify - Check container status"
      command: "docker compose -f {{ compose_file }} ps"
      register: container_status
      changed_when: false
    - name: "Verify - Display container status"
      debug:
        msg: "{{ container_status.stdout_lines }}"
    - name: "Verify - Test Nextcloud AIO direct access (LAN HTTPS)"
      uri:
        url: "https://{{ ubuntu_server_ip }}:9080/containers"
        method: GET
        timeout: 15
        validate_certs: false
        follow_redirects: all
      register: direct_access_test
      failed_when: false
    - name: "Verify - Test aio subdomain via Traefik (optional)"
      uri:
        url: "https://aio.{{ base_domain }}"
        method: GET
        timeout: 15
        validate_certs: false
        follow_redirects: all
      register: traefik_aio_test
      failed_when: false
    - name: "Verify - Check Traefik dynamic configuration"
      stat:
        path: "{{ traefik_config_file }}"
      register: traefik_config_check
    - name: "Detect Nextcloud AIO application container (for occ)"
      shell: docker ps -q -f name=nextcloud-aio-nextcloud
      register: nc_aio_app_container
      changed_when: false

    - name: "Configure - Trust loopback for local health (trusted_proxies)"
      command: >-
        docker exec --user www-data nextcloud-aio-nextcloud php occ
        config:system:set trusted_proxies 0 --value=127.0.0.1 --type=string
      when: nc_aio_app_container.stdout | length > 0
      register: occ_trusted_proxy_loopback
      changed_when: "'trusted_proxies' in occ_trusted_proxy_loopback.stdout"

    - name: "Configure - Trust Traefik Docker network for X-Forwarded-For
        (trusted_proxies)"
      command: >-
        docker exec --user www-data nextcloud-aio-nextcloud php occ
        config:system:set trusted_proxies 1 --value={{ docker_network_subnet }}
        --type=string
      when: nc_aio_app_container.stdout | length > 0
      register: occ_trusted_proxy_docker
      changed_when: "'trusted_proxies' in occ_trusted_proxy_docker.stdout"

    - name: "Configure - Allow OIDC discovery when Authentik resolves to LAN (split
        DNS)"
      command: >-
        docker exec --user www-data nextcloud-aio-nextcloud php occ
        config:system:set allow_local_remote_servers --type=bool --value=true
      when:
        - auth_enabled | default(false) | bool
        - nc_aio_app_container.stdout | length > 0
      register: occ_allow_local_remote
      changed_when: "'allow_local_remote_servers' in occ_allow_local_remote.stdout"

    - name: "Verify - Display access test results"
      debug:
        msg: |
          {% set ds = direct_access_test.status | default(-1, true) | int %}
          {% set ts = traefik_aio_test.status | default(-1, true) | int %}
          📡 NEXTCLOUD AIO ACCESS TEST RESULTS:

          • Direct (https://{{ ubuntu_server_ip }}:9080/containers):
          {% if ds in [200, 201, 301, 302, 303, 307, 308] %}
            ✅ Reachable (HTTP {{ ds }})
          {% elif ds in [400, 401, 403] %}
            ✅ AIO responded on 9080 (HTTP {{ ds }} — often normal; confirm in browser if unsure)
          {% elif ds == -1 %}
            ⚠️ Ansible could not complete HTTPS check from the target host (TLS/path). If the UI opens in a browser, ignore this line.
          {% else %}
            ⚠️ HTTP {{ ds }} — if https://{{ ubuntu_server_ip }}:9080/containers loads in a browser, the deploy is fine.
          {% endif %}

          • aio.{{ base_domain }} (Traefik, optional):
          {% if ts in [200, 201, 301, 302, 303, 307, 308] %}
            ✅ Reachable (HTTP {{ ts }})
          {% elif ts in [401, 403, 404, 502, 503] %}
            ⚠️ HTTP {{ ts }} — router or upstream may differ; LAN URL above is authoritative for AIO.
          {% elif ts == -1 %}
            ⏭️ No response from Ansible host (unrouted aio name, DNS, or right after Traefik restart). Use https://{{ ubuntu_server_ip }}:9080 unless you add an aio router.
          {% else %}
            ⚠️ HTTP {{ ts }}
          {% endif %}

          {% if traefik_config_check.stat.exists %}
          • Traefik dynamic (cloud): ✅ {{ traefik_config_file }}
          {% else %}
          • Traefik dynamic (cloud): ❌ missing
          {% endif %}

          💡 AIO setup: https://{{ ubuntu_server_ip }}:9080 (and https://aio.{{ base_domain }} if you route it in Traefik)
    # =============================================================================
    # SUMMARY: Deployment Summary and Next Steps
    # =============================================================================

    - name: "Summary - Final deployment summary"
      debug:
        msg: |
          ✅ Nextcloud All-in-One deployed successfully
          🌐 AIO Admin: https://aio.{{ base_domain }}
          📁 Future Nextcloud: https://cloud.{{ base_domain }} (after AIO setup)
          ⚠️  Complete AIO setup wizard and configure cloud.{{ base_domain }} domain
