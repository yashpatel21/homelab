---
# =============================================================================
# PHASE 2: Core Services - Traefik Reverse Proxy Deployment
# =============================================================================
#
# This playbook deploys Traefik reverse proxy with SSL automation, creating
# the foundation for all other web services in your homelab.
#
# Implementation: thin wrapper around the `traefik` Ansible role
# (roles/traefik/). The role creates only whoami-traefik (when whoami is enabled);
# all other *-traefik bridges are created by their service playbooks,
# then Traefik's compose template joins every enabled network. Other
# playbooks should include_role: traefik after deploy using docker_network for
# idempotent network creation.
#
# Prerequisites:
# - Phase 1 infrastructure setup completed
# - DNS overrides configured in OPNsense
# - Cloudflare API token configured in vault.yml
# - Docker installed and homelab network created
#
# What this playbook does:
# 1. Creates Traefik configuration directories
# 2. Ensures whoami-traefik exists when Whoami routing is enabled (idempotent)
# 3. Deploys Traefik Docker Compose stack with SSL automation
# 4. Configures Let's Encrypt certificates via Cloudflare DNS
# 5. Deploys whoami test service for SSL verification
# 6. Verifies service deployment and SSL functionality
#
# Idempotent Design:
# - Safe to run multiple times
# - whoami-traefik uses docker_network (no-op if already present)
# - Preserves existing SSL certificates
# - Handles configuration updates gracefully
# - Works with existing Portainer deployments
#
# Usage:
# ansible-playbook -i inventory/homelab.yml playbooks/services/deploy-traefik.yml --ask-vault-pass
#
# Execution:
# This playbook runs all tasks from start to finish to ensure the complete
# deployment and configuration of Traefik. All tasks are idempotent and
# safe to run multiple times.
# =============================================================================

- name: Deploy Traefik Reverse Proxy with SSL Automation
  hosts: ubuntu_servers
  become: true
  vars:
    service_name: traefik
    compose_file: "{{ data_directory }}/compose/{{ service_name }}-compose.yml"
    ssl_cert_resolver: myresolver
  roles:
    - traefik
