---
# =============================================================================
# PHASE 1: Infrastructure Foundation - Docker Installation & Configuration
# =============================================================================
#
# This playbook handles Docker installation and configuration on the Ubuntu
# server, creating the foundation for all containerized services.
#
# Prerequisites:
# - Complete infrastructure setup from prerequisites.md
# - Base system setup completed (setup-base.yml)
# - Storage configuration completed (setup-storage.yml)
#
# What this playbook does:
# 1. Installs Docker using the official installation script
# 2. Installs Docker Compose plugin
# 3. Adds primary user to docker group
# 4. Configures Docker daemon settings (including IPv6)
# 5. Creates homelab Docker network as a dual-stack bridge network
# 6. Enables and starts Docker service
# 7. Verifies Docker installation and functionality
#
# Idempotent Design:
# - Safe to run multiple times
# - Preserves existing Docker configuration
# - Handles Docker updates gracefully
# - Works with existing Docker installations
#
# Usage:
# ansible-playbook -i inventory/homelab.yml playbooks/infrastructure/setup-docker.yml --ask-vault-pass
# =============================================================================

- name: "Phase 1.3 - Ubuntu Server Docker Installation & Configuration"
  hosts: ubuntu_servers
  become: yes
  gather_facts: yes

  tasks:
    # -------------------------------------------------------------------------
    # DOCKER INSTALLATION
    # -------------------------------------------------------------------------

    - name: "Check if Docker is already installed"
      command: docker --version
      register: docker_version_check
      failed_when: false
      changed_when: false

    - name: "Download Docker installation script"
      get_url:
        url: https://get.docker.com
        dest: /tmp/get-docker.sh
        mode: "0755"
      when: docker_version_check.rc != 0

    - name: "Install Docker using official script"
      shell: /tmp/get-docker.sh
      when: docker_version_check.rc != 0

    - name: "Remove Docker installation script"
      file:
        path: /tmp/get-docker.sh
        state: absent
      when: docker_version_check.rc != 0

    - name: "Install Docker Compose plugin"
      apt:
        name: docker-compose-plugin
        state: present
        update_cache: yes

    # -------------------------------------------------------------------------
    # USER CONFIGURATION
    # -------------------------------------------------------------------------

    - name: "Add primary user to docker group"
      user:
        name: "{{ ubuntu_primary_user }}"
        groups: docker
        append: yes

    # -------------------------------------------------------------------------
    # DOCKER SERVICE CONFIGURATION
    # -------------------------------------------------------------------------

    - name: "Enable and start Docker service"
      systemd:
        name: docker
        enabled: yes
        state: started
        daemon_reload: yes

    - name: "Verify Docker service is running"
      systemd:
        name: docker
      register: docker_service_status

    # -------------------------------------------------------------------------
    # DOCKER DAEMON CONFIGURATION
    # -------------------------------------------------------------------------

    - name: "Create Docker daemon configuration directory"
      file:
        path: /etc/docker
        state: directory
        mode: "0755"

    - name: "Configure Docker daemon settings"
      copy:
        dest: /etc/docker/daemon.json
        mode: "0644"
        content: |
          {
            "log-driver": "json-file",
            "log-opts": {
              "max-size": "10m",
              "max-file": "3"
            },
            "storage-driver": "overlay2",
            "features": {
              "buildkit": true
            },
            "ipv6": true,
            "default-network-opts": {
              "bridge": {
                "com.docker.network.enable_ipv6": "true"
              }
            }
          }
      notify: restart docker

    - name: "Restart Docker now if daemon config changed"
      meta: flush_handlers

    # -------------------------------------------------------------------------
    # DOCKER NETWORK CONFIGURATION
    # -------------------------------------------------------------------------

    - name: "Create homelab Docker network (dual-stack)"
      docker_network:
        name: "{{ homelab_network_name }}"
        driver: bridge
        enable_ipv6: true
        ipam_config:
          - subnet: "{{ docker_network_subnet }}"
          - subnet: "{{ docker_network_subnet_v6 }}"
      become: no
      become_user: "{{ ubuntu_primary_user }}"

    # -------------------------------------------------------------------------
    # VERIFICATION
    # -------------------------------------------------------------------------

    - name: "Verify Docker installation"
      command: docker --version
      register: docker_version_final
      changed_when: false
      become: no
      become_user: "{{ ubuntu_primary_user }}"

    - name: "Verify Docker Compose installation"
      command: docker compose version
      register: docker_compose_version
      changed_when: false
      become: no
      become_user: "{{ ubuntu_primary_user }}"

    - name: "Verify Docker service is active"
      command: docker info
      register: docker_info
      changed_when: false
      become: no
      become_user: "{{ ubuntu_primary_user }}"

    - name: "Verify Docker IPv6 is enabled"
      shell: "docker info | grep -i '^ IPv6:' || true"
      register: docker_ipv6_status
      changed_when: false
      become: no
      become_user: "{{ ubuntu_primary_user }}"

    - name: "Inspect homelab Docker network"
      command: docker network inspect "{{ homelab_network_name }}"
      register: homelab_network_inspect
      changed_when: false
      become: no
      become_user: "{{ ubuntu_primary_user }}"

    - name: "Display Docker installation summary"
      debug:
        msg:
          - "Docker Version: {{ docker_version_final.stdout }}"
          - "Docker Compose Version: {{ docker_compose_version.stdout }}"
          - "Docker Service: {{ docker_service_status.status.ActiveState }}"
          - "Docker IPv6 Status: {{ docker_ipv6_status.stdout | default('Not found in docker info output') }}"
          - "Homelab Network: {{ homelab_network_name }}"
          - "Homelab IPv4 Subnet: {{ docker_network_subnet }}"
          - "Homelab IPv6 Subnet: {{ docker_network_subnet_v6 }}"

  # ---------------------------------------------------------------------------
  # HANDLERS
  # ---------------------------------------------------------------------------

  handlers:
    - name: restart docker
      systemd:
        name: docker
        state: restarted
        daemon_reload: yes