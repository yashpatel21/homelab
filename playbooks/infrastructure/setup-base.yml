---
# =============================================================================
# PHASE 1: Infrastructure Foundation - Base System Setup
# =============================================================================
#
# This playbook handles the fundamental system configuration for Ubuntu
# server after initial setup and SSH access is configured.
#
# Prerequisites:
# - Complete infrastructure setup from prerequisites.md
# - SSH access configured on all hosts
# - Admin users created via web interfaces
# - Ubuntu Server installed with SSH access
# - OPNsense LAN/WAN networking configured and working
#
# What this playbook does:
# 1. Configures Ubuntu host networking with static IPv4 and dynamic IPv6
# 2. Updates Ubuntu system packages to latest versions
# 3. Installs essential utilities for system management
# 4. Sets up timezone, locale, and automatic security updates
#
# Idempotent Design:
# - Safe to run multiple times
# - Maintains a single authoritative netplan configuration
# - Disables cloud-init network ownership to avoid conflicting netplan files
# - Handles package updates gracefully
# - Works with both fresh installs and existing systems
#
# Usage:
# ansible-playbook -i inventory/homelab.yml playbooks/infrastructure/setup-base.yml --ask-vault-pass
#
# Execution:
# This playbook runs all tasks from start to finish to ensure the complete
# base system configuration. All tasks are idempotent and safe to run multiple times.
# =============================================================================

- name: "Phase 1.1 - Ubuntu Server Base System Setup"
  hosts: ubuntu_servers
  become: yes
  gather_facts: yes

  tasks:
    # -------------------------------------------------------------------------
    # UBUNTU HOST NETWORK CONFIGURATION
    # -------------------------------------------------------------------------

    - name: "Disable cloud-init network management"
      copy:
        dest: /etc/cloud/cloud.cfg.d/99-disable-network-config.cfg
        content: |
          network: {config: disabled}
        owner: root
        group: root
        mode: "0644"

    - name: "Remove cloud-init generated netplan file"
      file:
        path: /etc/netplan/50-cloud-init.yaml
        state: absent
      notify: apply netplan

    - name: "Configure authoritative netplan for Ubuntu host"
      copy:
        dest: /etc/netplan/00-installer-config.yaml
        content: |
          network:
            version: 2
            ethernets:
              {{ ubuntu_network_interface | default('ens18') }}:
                addresses:
                  - {{ ubuntu_server_ip | default('192.168.1.20') }}/{{ ubuntu_ipv4_prefix | default('24') }}
                nameservers:
                  addresses:
                    - {{ ubuntu_dns_ipv4 | default('192.168.1.1') }}
                  search:
                    - {{ ubuntu_search_domain | default('localdomain') }}
                routes:
                  - to: default
                    via: {{ ubuntu_ipv4_gateway | default('192.168.1.1') }}
                dhcp6: true
        owner: root
        group: root
        mode: "0600"
      notify: apply netplan

    # -------------------------------------------------------------------------
    # SYSTEM PACKAGE MANAGEMENT
    # -------------------------------------------------------------------------

    - name: "Update apt package cache"
      apt:
        update_cache: yes
        cache_valid_time: 3600

    - name: "Upgrade all packages to latest version"
      apt:
        upgrade: dist
        autoremove: yes
        autoclean: yes
      register: apt_upgrade

    - name: "Install essential system utilities"
      apt:
        name:
          - htop
          - tree
          - net-tools
          - curl
          - wget
          - git
          - vim
          - unzip
          - apache2-utils
          - software-properties-common
        state: present

    # -------------------------------------------------------------------------
    # SYSTEM CONFIGURATION
    # -------------------------------------------------------------------------

    - name: "Set system timezone"
      timezone:
        name: "{{ system_timezone }}"

    - name: "Configure system locale"
      locale_gen:
        name: "{{ system_locale }}"
        state: present

    - name: "Set default locale"
      lineinfile:
        path: /etc/default/locale
        regexp: "^LANG="
        line: "LANG={{ system_locale }}"
        create: yes

    # -------------------------------------------------------------------------
    # AUTOMATIC SECURITY UPDATES
    # -------------------------------------------------------------------------

    - name: "Install unattended-upgrades for automatic security updates"
      apt:
        name: unattended-upgrades
        state: present

    - name: "Configure automatic security updates"
      lineinfile:
        path: /etc/apt/apt.conf.d/20auto-upgrades
        regexp: "{{ item.regexp }}"
        line: "{{ item.line }}"
        create: yes
      loop:
        - { regexp: "^APT::Periodic::Update-Package-Lists", line: "APT::Periodic::Update-Package-Lists \"1\";" }
        - { regexp: "^APT::Periodic::Unattended-Upgrade", line: "APT::Periodic::Unattended-Upgrade \"1\";" }

  handlers:
    - name: apply netplan
      command: netplan apply